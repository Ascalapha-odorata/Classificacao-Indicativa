<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo de Filmes Infantil</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <div class="container">
      <div class="header-content">
        <h1><i class="fas fa-film"></i> Catálogo de Filmes</h1>
        <p class="subtitle">Encontre os melhores filmes para crianças de todas as idades!</p>
        
        <div class="favoritos-header">
          <button id="btnFavoritos" class="btn-favoritos">
            <i class="fas fa-heart"></i> Meus Favoritos (<span id="contadorFavoritos">0</span>)
          </button>
        </div>
        
        <div class="busca-container">
          <div class="input-group">
            <label for="txtPesquisa">Buscar filme:</label>
            <input type="text" id="txtPesquisa" placeholder="Digite o nome do filme...">
          </div>
          
          <div class="input-group">
            <label for="filtroClassificacao">Classificação etária:</label>
            <select id="filtroClassificacao">
              <option value="">Todas as classificações</option>
              <option value="0">Livre</option>
              <option value="10">10 anos</option>
              <option value="12">12 anos</option>
              <option value="14">14 anos</option>
              <option value="16">16 anos</option>
              <option value="18">18 anos</option>
            </select>
            <div class="checkbox-group">
              <input type="checkbox" id="checkMax">
              <label for="checkMax">Filtrar até esta classificação</label>
            </div>
          </div>
          
          <button id="btnPesquisa" class="btn"><i class="fas fa-search"></i> Buscar Filmes</button>
        </div>
      </div>
    </div>
  </header>

  <main class="container">
    <div class="modo-exibicao">
      <button id="btnTodos" class="btn-modo ativo"><i class="fas fa-film"></i> Todos os Filmes</button>
      <button id="btnFavoritosView" class="btn-modo"><i class="fas fa-heart"></i> Meus Favoritos</button>
    </div>
    
    <div id="loading" class="loading">
      <i class="fas fa-spinner fa-spin"></i> Carregando filmes...
    </div>
    
    <div id="resultado"></div>
  </main>

  <div id="modalFavoritos" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2><i class="fas fa-heart"></i> Meus Filmes Favoritos</h2>
        <span class="close">&times;</span>
      </div>
      <div class="modal-body" id="listaFavoritos">
        <!-- Lista de favoritos será preenchida dinamicamente -->
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
